    <style>
        body {
            background-color: #000000;
            /* Mandatory Sanctuary Black */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom breathing animation simulation via CSS for static rendering intent */
        .breathing-circle {
            box-shadow: 0 0 80px 10px rgba(26, 115, 232, 0.2);
            animation: breathe 8s infinite ease-in-out;
        }

        .vibration-ring {
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: ripple 8s infinite linear;
        }

        .vibration-ring:nth-child(1) { animation-delay: 0s; }
        .vibration-ring:nth-child(2) { animation-delay: 2s; }
        .vibration-ring:nth-child(3) { animation-delay: 4s; }

        @keyframes breathe {
            0%, 100% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        @keyframes ripple {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

                    Expansion</span>

            <!-- Vibration Visual Cue Rings -->

            <div class="vibration-ring absolute w-80 h-80 rounded-full opacity-20"></div>
            <div class="vibration-ring absolute w-64 h-64 rounded-full opacity-30"></div>
            <!-- Central Expanding Body -->
            <div

            </div>
            <!-- Orbital Data (Asymmetric Editorial Element) -->

                </div>
                <div class="flex flex-col border-l border-zinc-800 pl-4">

        </div>
        <!-- Sequence Indicators -->

            </div>
            <div class="flex flex-col items-center opacity-40">
